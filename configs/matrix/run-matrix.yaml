# Sweep config for scripts/run_matrix.py.
#   conda run -n lora_lab python scripts/run_matrix.py --config configs/matrix/run-matrix.yaml
# Any CLI flag (e.g. --wandb-mode online) overrides the matching field here.
# The resolved config is saved to <output_root>/_matrix/matrix-<timestamp>.yaml per run.

# --- which models to run ----------------------------------------------------
# HF model ids, walked smallest-first. Comment a line out to skip one.
# Sizes are weights only at fp16/bf16 (~2 bytes/param); fp32 is ~2x.
# The last two are gated (need HF_TOKEN + accepted licenses).
models:
  #- HuggingFaceTB/SmolLM2-135M          # 135M params, ~0.27 GB fp16
  #- Qwen/Qwen2.5-0.5B-Instruct          # 494M params, ~0.99 GB fp16
  #- Qwen/Qwen2.5-1.5B-Instruct          # 1.54B params, ~3.1 GB fp16
  - google/gemma-2-2b-it                # 2.61B params, ~5.2 GB fp16  (gated)
  #- meta-llama/Llama-3.2-1B-Instruct    # 1.24B params, ~2.5 GB fp16  (gated)

tasks:
  - task1564_triviaqa_answer_generation
  - task843_financial_phrasebank_classification
  - task512_twitter_emotion_classification
  - task1344_glue_entailment_classification
  - task639_multi_woz_user_utterance_generation

methods:
  - qlora
  - lora
  - full_ft

# --- per-cell sizing --------------------------------------------------------
max_train_samples: 500   # -1 => full split
max_steps: -1            # -1 => use epochs
epochs: 3.0
max_eval_samples: 100
lora_rank: 16

# --- logging / output -------------------------------------------------------
wandb_mode: online              # online | offline | disabled
wandb_project: lora-lab-phase0
wandb_entity: doku88            # your W&B username/team; null => account default
                                # (the default entity here is a team you can't
                                # write to, which is what caused permission-denied)
skip_eval: false
no_aggregate: false
output_root: results/runs
