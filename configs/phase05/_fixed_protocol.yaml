# Phase 0.5 fixed measurement protocol (sprint plan Sprint 1).
#
# Every technique run inherits THESE settings and overrides only `technique.*`
# (and, for the Sprint 6 ablation, `levers.*`) so the trade-off table rows are
# apples-to-apples: same base, same task, same batch/seq/seed/steps. Changing
# anything here invalidates cross-technique comparison — don't tune per run.
#
# Usage (a technique run = this protocol + a technique override):
#   conda run -n lora_lab python scripts/benchmark.py \
#       --protocol configs/phase05/_fixed_protocol.yaml \
#       --set technique.name=zero_offload
#
# NOTE: offload techniques (zero_offload, zero_infinity) need CUDA_HOME set:
#   CUDA_HOME=/home/shadow1/miniconda3/envs/lora_lab conda run -n lora_lab ...

method: full_ft                      # Phase 0.5 is full-parameter only
base_model: mistralai/Mistral-7B-Instruct-v0.2
task: task843_financial_phrasebank_classification
output_root: results/phase05/runs

hparams:
  lr: 1.0e-5                         # conservative full-FT LR (7B)
  batch_size: 1                      # fixed; memory pressure comes from the 7B, not batch
  grad_accum: 8                      # effective batch 8, fixed across techniques
  max_steps: 50                      # benchmark length — measure speed/memory, NOT convergence
  max_train_samples: 1024            # enough to feed 50 steps without re-looping
  max_seq_len: 512                   # fixed sequence length
  warmup_ratio: 0.0
  weight_decay: 0.0
  lr_scheduler: constant
  seed: 42

# Technique + levers are overridden per run. Defaults below = the no-op baseline
# (only fits on small models; real Mistral-7B runs override technique.name).
technique:
  name: baseline

levers:
  use_8bit_adam: false
  gradient_checkpointing: false
  activation_offload: false
  drop_fp32_master: false
  optimizer_offload: true

logging:
  log_every: 5
  mem_trace_every: 1
  wandb_project: lora-lab-phase05
  wandb_mode: offline                # best-effort; never gates a run

eval:
  metric: exact_match
  max_eval_samples: 181              # full held-out set for this task (Sprint 7 quality eval)
  gen_max_new_tokens: 16
  batch_size: 8
