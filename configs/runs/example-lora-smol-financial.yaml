method: lora
base_model: HuggingFaceTB/SmolLM2-135M
task: task843_financial_phrasebank_classification
run_name: null
output_root: results/runs
hparams:
  lr: 0.0002
  batch_size: 8
  grad_accum: 1
  num_epochs: 3
  max_steps: 250
  max_train_samples: 500
  max_seq_len: 384
  warmup_ratio: 0.03
  weight_decay: 0.0
  lr_scheduler: cosine
  seed: 42
lora:
  r: 16
  alpha: 32
  dropout: 0.0
  target_modules:
  - q_proj
  - v_proj
  - k_proj
  - o_proj
quant:
  load_in_4bit: true
  quant_type: nf4
  double_quant: true
  compute_dtype: bfloat16
full_ft:
  use_8bit_adam: true
  gradient_checkpointing: false
logging:
  log_every: 10
  mem_trace_every: 1
  wandb_project: lora-lab-phase0
  wandb_mode: offline
  wandb_entity: null
eval:
  metric: rougeL
  max_eval_samples: 100
  gen_max_new_tokens: 128
  batch_size: 8
