# Reconstruction warmup — relative Frobenius error on ΔW vs train-split library LoRAs.
# Cheap: NO base forward pass — just regress generated ΔW onto each train task's
# library adapter. Produces the init checkpoint the generalization run warm-starts from.
# Train-split only (never touches held-out targets).
base_model: mistralai/Mistral-7B-Instruct-v0.2
target_modules: [q_proj, k_proj, v_proj]
load_in_4bit: true
rank: 16
alpha: 32
parameterization: full
encoder_model: Alibaba-NLP/gte-large-en-v1.5
layer_dim: 16
module_dim: 8
trunk_hidden: 256
objective: reconstruction
lr: 1.0e-3
max_steps: 3000
batch_size: 64       # tasks (LoRAs) sampled per step
grad_accum: 1
max_seq_len: 512
seed: 42
gradient_checkpointing: false   # no base forward in reconstruction
warmup_from: null
library_path: configs/phase1/library.yaml
split_path: configs/phase1/heldout_split.yaml
device: cuda
output_root: results/phase2/runs
run_name: recon-warmup-lowrank
wandb_project: lora-lab-phase2
wandb_mode: offline
