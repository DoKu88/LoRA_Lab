# SFT meta-training: apply the generated LoRA to the frozen 4-bit Mistral-7B, run
# the task, and backprop the task loss THROUGH the base into the hypernetwork.
# VRAM-heavy.
#
# Recommended order:
#   1. (optional) reconstruction warmup:
#        python scripts/train_reconstruction.py --config configs/phase2/recon-warmup.yaml
#   2. this SFT run (warm-starts from the recon checkpoint if present)
#   3. eval vs baselines (generated > retrieval on held-out)
base_model: mistralai/Mistral-7B-Instruct-v0.2
target_modules: [q_proj, k_proj, v_proj]   # match the library adapters
load_in_4bit: true                          # QLoRA-style frozen base
rank: 16
alpha: 32
parameterization: lowrank   # 151.4M params (generates real A/B via a bottleneck;
                            # vera 55.7M can't reconstruct a target ΔW, full 2.65B OOMs).
encoder_model: sentence-transformers/all-MiniLM-L6-v2
layer_dim: 16
module_dim: 8
trunk_hidden: 256
objective: sft
lr: 1.0e-4
max_steps: 2000
batch_size: 4
grad_accum: 2
max_seq_len: 512
seed: 42
gradient_checkpointing: true   # base-backprop memory lever
warmup_from: results/phase2/runs/recon-warmup-lowrank/hypernet.pt
library_path: configs/phase1/library.yaml
split_path: configs/phase1/heldout_split.yaml
device: cuda
output_root: results/phase2/runs
run_name: sft-lowrank-mistral7b
wandb_project: lora-lab-phase2
wandb_mode: offline
