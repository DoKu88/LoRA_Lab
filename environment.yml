# LoRA_Lab — dedicated conda env for the Phase 0 three-way comparison.
# Reproduce with:  conda env create -f environment.yml
#
# Verified on an RTX 5090 (32 GB, sm_120 / capability (12, 0)), driver 580,
# CUDA 12.8. The torch family is pulled from the cu128 wheel index; all other
# versions are pinned to the set that passed scripts/smoke_test.py.
name: lora_lab
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - pip:
      # torch family must come from the CUDA 12.8 (sm_120) wheel index
      - --extra-index-url https://download.pytorch.org/whl/cu128
      - torch==2.10.0
      - torchvision==0.25.0
      - torchao==0.17.0
      - triton==3.6.0
      # HF + PEFT + quantization
      - transformers==5.5.0
      - peft==0.19.1
      - bitsandbytes==0.49.2
      - trl==0.24.0
      - accelerate==1.14.0
      - datasets==4.3.0
      - tokenizers==0.22.2
      - safetensors==0.8.0
      - sentencepiece==0.2.1
      # numerics / io / plotting / config
      - numpy==2.4.4
      - pandas>=2.2
      - pyarrow>=17.0
      - matplotlib>=3.9
      - pyyaml>=6.0
      - rouge-score>=0.1.2
      # experiment tracking (best-effort, offline-capable)
      - wandb>=0.18
